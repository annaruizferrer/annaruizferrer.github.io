<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Instagram-like App</title>
    <style>
        /* Basic styling */
        body {
            font-family: Arial, sans-serif;
            /* font-family: Inter, sans-serif; */
            margin: 0;
            padding: 0;
            background-color: #fafafa;
        }
        section {
            display: flex;
            align-items: center;
            padding: 10px;
            justify-content: space-between;
        }
        svg {
            fill:#36454F;
        }
        .post {
            max-width: 600px;
            margin: 20px auto;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0px 0px 10px 0px rgba(0,0,0,0.1);
        }
        .profile {
            display: flex;
            align-items: center;
        }
        .side {
            display: flex;
            align-items: center;
        }

        .icons {
            width: 40px;
            height: 40px;
            padding: 10px;
        }
        .profile-pic {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 10px;
        }
        .username {
            font-weight: bold;
            float: left;
            color: #36454F;
        }
        .info-text {
            font-weight: bold;
            float: left;
            color: #36454F;
        }
        .reel {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch; /* Enables smooth scrolling on iOS */
            /* touch-action: pinch-zoom;
            transform-origin: center center;
            transition: transform 0.5s;
        }
        .reel.scalable {
            transform: scale(1.2); */
        }
        .post-image {
            flex: 0 0 auto;
            scroll-snap-align: start;
            overflow: hidden;
            max-width: 100%;
            touch-action: manipulation; /* Enable touch event manipulation */
        }
        .post-image img {
            width: 100%;
            height: auto;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .post-zoom {
            flex: 0 0 auto;
            scroll-snap-align: start;
            overflow: hidden;
            max-width: 100%;
            touch-action: manipulation; /* Enable touch event manipulation */
        }
        .post-zoom img {
            width: 100%;
            height: auto;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
    </style>
</head>
